replicaCount: 1

image:
  # repository/tag below are automatically updated by the CI workflow
  # (.github/workflows/build-and-deploy.yml) after each push to main.
  # Manual edits here will be overwritten on the next CI run.
  repository: ghcr.io/mhmd-moradi/pdf-service-worker
  tag: "d27572aa1b53df33d13a3dd1019d87c30a666df1"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  postgresHost: "postgres-postgresql"
  postgresPort: "5432"
  postgresDb: "pdfservice"
  postgresUser: "pdfapp"
  redisHost: "redis-master"
  redisPort: "6379"
  redisQueueName: "pdf_jobs"
  resultsDir: "/app/results"

postgresSecretName: "postgres-credentials"
postgresSecretKey: "password"
resultsPvcName: "pdf-results"

cronjob:
  enabled: true
  # Every day at 3am
  schedule: "0 3 * * *"
  retentionDays: 7
  # CronJobs don't need the full worker resource budget -- it's a quick
  # DB query + a few file deletes, not a browser render.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
