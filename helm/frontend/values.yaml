replicaCount: 1

image:
  # repository/tag below are automatically updated by the CI workflow
  # (.github/workflows/build-and-deploy.yml) after each push to main.
  # Manual edits here will be overwritten on the next CI run.
  repository: ghcr.io/mhmd-moradi/pdf-service-frontend
  tag: "d27572aa1b53df33d13a3dd1019d87c30a666df1"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80

# Ingress is off by default (minikube uses the NodePort service above via
# `minikube service`). EKS enables this instead, routing through the AWS
# Load Balancer Controller to a real ALB.
ingress:
  enabled: false
  className: alb
  annotations: {}
  host: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
