apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: pdf-service
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/mhmd-moradi/pdf-service.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/eks-dev/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: pdf-service
