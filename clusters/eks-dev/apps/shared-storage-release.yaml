apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shared-storage
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: default
  releaseName: shared-storage
  chart:
    spec:
      chart: ./helm/shared-storage
      sourceRef:
        kind: GitRepository
        name: pdf-service
      reconcileStrategy: Revision
  values:
    storage:
      storageClassName: gp3
