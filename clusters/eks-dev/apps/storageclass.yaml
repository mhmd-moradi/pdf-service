# EKS ships with no default StorageClass. Without this (and the EBS CSI
# driver addon from Terraform), every PVC in this cluster stays Pending
# forever -- this bit minikube users by surprise the most, since minikube's
# hostPath-based default StorageClass just works with zero setup.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters:
  type: gp3
