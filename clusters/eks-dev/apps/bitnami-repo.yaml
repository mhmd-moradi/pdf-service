# Bitnami now distributes charts via OCI (registry-1.docker.io/bitnamicharts)
# rather than the old HTTP index-based repo -- type: oci is required for
# Flux to resolve these correctly.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: flux-system
spec:
  interval: 1h
  type: oci
  url: oci://registry-1.docker.io/bitnamicharts
