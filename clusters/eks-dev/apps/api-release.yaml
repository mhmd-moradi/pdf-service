apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: api
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: default
  releaseName: api
  dependsOn:
    - name: shared-storage
    - name: postgres
    - name: redis
    - name: aws-load-balancer-controller
  chart:
    spec:
      chart: ./helm/api
      sourceRef:
        kind: GitRepository
        name: pdf-service
      reconcileStrategy: Revision
  values:
    ingress:
      enabled: true
      className: alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
