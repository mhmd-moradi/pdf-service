apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: worker
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: default
  releaseName: worker
  dependsOn:
    - name: shared-storage
    - name: postgres
    - name: redis
  chart:
    spec:
      chart: ./helm/worker
      sourceRef:
        kind: GitRepository
        name: pdf-service
      reconcileStrategy: Revision
