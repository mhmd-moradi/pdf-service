# Tells Flux where "the truth" lives: this Git repo, main branch.
# Flux polls this every 1m for changes and reconciles the cluster to match.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: pdf-service
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/mhmd-moradi/pdf-service.git
  ref:
    branch: main
---
# Tells Flux WHICH path in that repo to actually apply, and how often.
# prune: true means if you delete a manifest from Git, Flux deletes the
# corresponding resource from the cluster too -- Git is fully authoritative.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/minikube/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: pdf-service
