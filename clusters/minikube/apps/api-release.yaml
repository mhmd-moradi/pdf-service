apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: api
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: default
  # Flux won't install this until these releases report Ready -- avoids the
  # API pod crash-looping on a missing PVC/Secret/DB during first install.
  dependsOn:
    - name: shared-storage
    - name: postgres
    - name: redis
  chart:
    spec:
      chart: ./helm/api
      sourceRef:
        kind: GitRepository
        name: pdf-service
      reconcileStrategy: Revision
