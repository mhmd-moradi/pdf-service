<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL to PDF Service</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
  h1 { font-size: 1.4rem; }
  form { display: flex; gap: 8px; margin-bottom: 24px; }
  input[type=text] { flex: 1; padding: 8px 10px; font-size: 1rem; }
  button { padding: 8px 16px; font-size: 1rem; cursor: pointer; }
  #status-box { margin: 16px 0; padding: 12px; border-radius: 6px; background: #f5f5f5; display: none; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e0e0e0; font-size: 0.9rem; }
  .status-pending { color: #b8860b; }
  .status-processing { color: #1e6fd9; }
  .status-completed { color: #1a8a3d; }
  .status-failed { color: #c0392b; }
</style>
</head>
<body>
  <h1>URL &rarr; PDF Service App</h1>

  <form id="submit-form">
    <input type="text" id="url-input" placeholder="https://example.com" required>
    <button type="submit">Convert to PDF</button>
  </form>

  <div id="status-box"></div>

  <h2>Past jobs</h2>
  <table>
    <thead>
      <tr><th>URL</th><th>Status</th><th>Created</th><th>Result</th></tr>
    </thead>
    <tbody id="jobs-table-body"></tbody>
  </table>

<script>
  // In Kubernetes this becomes the API service's ClusterIP/Ingress URL.
  // Kept as a plain constant for now -- no build step needed for this frontend.
  const API_BASE = "http://localhost:8000";

  const form = document.getElementById("submit-form");
  const urlInput = document.getElementById("url-input");
  const statusBox = document.getElementById("status-box");
  const jobsTableBody = document.getElementById("jobs-table-body");

  let pollTimer = null;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const url = urlInput.value.trim();
    statusBox.style.display = "block";
    statusBox.textContent = "Submitting...";

    try {
      const res = await fetch(`${API_BASE}/jobs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      if (!res.ok) {
        const err = await res.json();
        statusBox.textContent = `Error: ${JSON.stringify(err.detail)}`;
        return;
      }
      const job = await res.json();
      statusBox.textContent = `Job ${job.job_id} submitted (status: ${job.status})`;
      urlInput.value = "";
      pollJobStatus(job.job_id);
      loadJobs();
    } catch (err) {
      statusBox.textContent = `Request failed: ${err.message}`;
    }
  });

  function pollJobStatus(jobId) {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      const res = await fetch(`${API_BASE}/jobs/${jobId}`);
      if (!res.ok) return;
      const job = await res.json();
      statusBox.textContent = `Job ${job.id}: ${job.status}`;
      if (job.status === "completed" || job.status === "failed") {
        clearInterval(pollTimer);
        loadJobs();
      }
    }, 2000);
  }

  async function loadJobs() {
    const res = await fetch(`${API_BASE}/jobs`);
    const jobs = await res.json();
    jobsTableBody.innerHTML = "";
    for (const job of jobs) {
      const tr = document.createElement("tr");
      const resultCell = job.status === "completed"
        ? `<a href="${API_BASE}/jobs/${job.id}/result" target="_blank">download</a>`
        : "-";
      tr.innerHTML = `
        <td>${job.url}</td>
        <td class="status-${job.status}">${job.status}</td>
        <td>${new Date(job.created_at).toLocaleString()}</td>
        <td>${resultCell}</td>
      `;
      jobsTableBody.appendChild(tr);
    }
  }

  loadJobs();
</script>
</body>
</html>
